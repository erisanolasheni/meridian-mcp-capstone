[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: agent/UI flows with mocked HTTP/MCP/LLM
    live: real Meridian MCP (network); set RUN_LIVE_MCP=1

addopts =
    --cov=meridian_chatbot
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=100
